services:
  backend:
    build:
      context: ./book-my-flix-be
      dockerfile: Dockerfile
    ports:
      - "3333:3333"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
